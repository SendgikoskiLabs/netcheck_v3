# SendgikoskiLabs NetCheck — InfluxDB Configuration
# ====================================================
# This file configures the InfluxDB export feature used by:
#   python sendgikoski_netcheck.py monitor --influx
#
# Priority order (highest to lowest):
#   1. CLI flags   (--influx-url, --influx-token, etc.)
#   2. This file   (influx.cfg)
#   3. Environment variables (INFLUX_URL, INFLUX_TOKEN, etc.)
#
# Version is auto-detected:
#   - token present  → InfluxDB 2.x
#   - no token       → InfluxDB 1.x (use username/password or leave blank)

[influxdb]

# ── InfluxDB server URL ──────────────────────────────────────────────────────
url = 

# ── InfluxDB 2.x settings ───────────────────────────────────────────────────
# Generate a token in the InfluxDB UI: Data → API Tokens → Generate
# Leave blank to use InfluxDB 1.x mode instead.
token    = 
org      = 
bucket   = 

# ── InfluxDB 1.x settings ───────────────────────────────────────────────────
# Used only when 'token' is blank above.
# Leave username/password blank if auth is disabled (common for local installs).
username =
password =
database = netcheck

# ── Quick setup examples ─────────────────────────────────────────────────────
#
# Local InfluxDB 2.x (Docker):
#   url    = http://localhost:8086
#   token  = my-super-secret-token
#   org    = sendgikoskilabs
#   bucket = netcheck
#
# Local InfluxDB 1.x (Docker):
#   url      = http://localhost:8086
#   database = netcheck
#   (leave token, username, password blank)
#
# InfluxDB Cloud (free tier):
#   url    = https://us-east-1-1.aws.cloud2.influxdata.com
#   token  = <your cloud token>
#   org    = <your org name or email>
#   bucket = netcheck
#
# ── Environment variable equivalents ────────────────────────────────────────
#   INFLUX_URL, INFLUX_TOKEN, INFLUX_ORG, INFLUX_BUCKET
#   INFLUX_USERNAME, INFLUX_PASSWORD, INFLUX_DATABASE
